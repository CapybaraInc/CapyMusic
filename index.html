<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyMusic Radio 🦫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #0d1117 0%, #161b22 40%, #1a3a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* Звёзды */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.9;
            }
        }

        /* Луна */
        .moon {
            position: fixed;
            top: 25px;
            right: 40px;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #fffde7, #f9e076);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 230, 150, 0.5);
            z-index: 0;
        }

        /* Лого */
        .logo {
            position: fixed;
            top: 22px;
            left: 30px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 2.5px;
            z-index: 10;
            text-transform: uppercase;
        }
        .logo span {
            color: #F4D068;
            font-weight: 700;
        }

        /* Счётчик песен */
        .song-counter {
            position: fixed;
            top: 22px;
            right: 120px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 10;
        }
        .song-counter b {
            color: #F4D068;
        }

        /* Главный контейнер */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            z-index: 1;
            position: relative;
        }

        /* Сцена */
        .stage {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 10px;
            position: relative;
            min-height: 170px;
        }

        /* Маленькие капибары */
        .side-capy {
            font-size: 42px;
            position: relative;
            transition: all 0.4s;
        }
        .side-capy.chill {
            animation: sideChill 2s ease-in-out infinite;
        }
        .side-capy.dance {
            animation: sideDance 0.4s ease-in-out infinite;
        }
        .side-capy.sleep {
            animation: sideSleep 3s ease-in-out infinite;
            opacity: 0.7;
        }
        .side-capy .sombrero {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 25px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .side-capy.show-sombrero .sombrero {
            opacity: 1;
        }
        .side-capy .zzz {
            position: absolute;
            top: -20px;
            right: -5px;
            font-size: 16px;
            opacity: 0;
            animation: floatZ 2s ease-out infinite;
        }
        .side-capy.sleep .zzz {
            opacity: 1;
        }

        @keyframes floatZ {
            0% {
                transform: translateY(0);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-25px);
                opacity: 0;
            }
        }
        @keyframes sideChill {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        @keyframes sideDance {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            20% {
                transform: translateY(-12px) rotate(-5deg);
            }
            40% {
                transform: translateY(-3px) rotate(3deg);
            }
            60% {
                transform: translateY(-9px) rotate(-2deg);
            }
            80% {
                transform: translateY(-14px) rotate(4deg);
            }
        }
        @keyframes sideSleep {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-2px) scale(1.02);
            }
        }

        /* Главная капибара */
        .main-capy-wrapper {
            position: relative;
        }
        .main-capy-container {
            position: relative;
            display: inline-block;
        }
        .main-capy {
            font-size: 100px;
            position: relative;
            z-index: 2;
            transition: all 0.4s;
        }
        .main-capy.chill {
            animation: mainChill 2.5s ease-in-out infinite;
        }
        .main-capy.dance {
            animation: mainDance 0.35s ease-in-out infinite;
        }
        .main-capy.sleep {
            animation: mainSleep 3.5s ease-in-out infinite;
            filter: brightness(0.7);
        }

        /* Язык высунут (спящий режим) */
        .tongue {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .tongue.visible {
            opacity: 1;
            animation: tongueWiggle 2s ease-in-out infinite;
        }
        @keyframes tongueWiggle {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            30% {
                transform: translateX(-50%) translateY(2px);
            }
            60% {
                transform: translateX(-50%) translateY(-1px);
            }
        }

        /* Волосы */
        .hair-svg {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .hair-svg.visible {
            opacity: 1;
        }

        /* Сомбреро */
        .main-sombrero {
            position: absolute;
            top: -55px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .main-sombrero.visible {
            opacity: 1;
        }

        /* Собака */
        .dog {
            position: absolute;
            bottom: 5px;
            right: -30px;
            font-size: 35px;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .dog.visible {
            opacity: 0.8;
            animation: dogSleep 4s ease-in-out infinite;
        }
        .dog .dog-tongue {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }
        @keyframes dogSleep {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }

        /* Чат-пузырь */
        .thought-bubble {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 8px 16px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.5s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }
        .thought-bubble.visible {
            opacity: 1;
        }
        .thought-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes mainChill {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-4px) scale(1.02);
            }
            60% {
                transform: translateY(-2px) scale(1.01);
            }
        }
        @keyframes mainDance {
            0%,
            100% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            15% {
                transform: translateY(-16px) rotate(-4deg) scale(1.06);
            }
            30% {
                transform: translateY(-4px) rotate(2deg) scale(0.97);
            }
            45% {
                transform: translateY(-10px) rotate(-3deg) scale(1.04);
            }
            60% {
                transform: translateY(-18px) rotate(5deg) scale(1.08);
            }
            75% {
                transform: translateY(-6px) rotate(-1deg) scale(1.01);
            }
            90% {
                transform: translateY(-13px) rotate(3deg) scale(1.05);
            }
        }
        @keyframes mainSleep {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            40% {
                transform: translateY(-3px) scale(1.02);
            }
            70% {
                transform: translateY(-1px) scale(1.01);
            }
        }

        /* Эквалайзер */
        .equalizer {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 20px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .equalizer.visible {
            opacity: 0.6;
        }
        .eq-bar {
            width: 3px;
            background: #F4D068;
            border-radius: 2px;
            animation: eqJump 0.6s ease-in-out infinite;
        }
        .eq-bar:nth-child(1) {
            animation-delay: 0s;
            height: 12px;
        }
        .eq-bar:nth-child(2) {
            animation-delay: 0.15s;
            height: 18px;
        }
        .eq-bar:nth-child(3) {
            animation-delay: 0.3s;
            height: 10px;
        }
        .eq-bar:nth-child(4) {
            animation-delay: 0.45s;
            height: 16px;
        }
        @keyframes eqJump {
            0%,
            100% {
                transform: scaleY(0.5);
            }
            50% {
                transform: scaleY(1);
            }
        }

        /* Карточка трека */
        .track-info {
            text-align: center;
            color: white;
            transition: all 0.4s;
        }
        .track-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .track-artist {
            font-size: 13px;
            opacity: 0.5;
            margin-top: 2px;
        }
        .track-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .badge-female {
            background: rgba(244, 208, 104, 0.15);
            color: #F4D068;
            border: 1px solid rgba(244, 208, 104, 0.25);
        }
        .badge-male {
            background: rgba(100, 180, 255, 0.15);
            color: #64b4ff;
            border: 1px solid rgba(100, 180, 255, 0.25);
        }
        .badge-macarena {
            background: rgba(255, 100, 100, 0.15);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.25);
            animation: pulse 1s infinite;
        }
        .badge-break {
            background: rgba(100, 220, 180, 0.15);
            color: #64dcb4;
            border: 1px solid rgba(100, 220, 180, 0.25);
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* Кнопки */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-play {
            width: 48px;
            height: 48px;
            padding: 0;
            border-radius: 50%;
            font-size: 18px;
            background: rgba(244, 208, 104, 0.18);
            border-color: rgba(244, 208, 104, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .btn-play:hover {
            background: rgba(244, 208, 104, 0.28);
        }
        .btn-play.break-mode {
            background: rgba(100, 220, 180, 0.18);
            border-color: rgba(100, 220, 180, 0.35);
        }

        /* Прогресс */
        .progress-container {
            width: 260px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #F4D068;
            border-radius: 8px;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-bar.break-bar {
            background: #64dcb4;
        }
        .progress-time {
            display: flex;
            justify-content: space-between;
            width: 260px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            margin-top: 3px;
        }

        .hidden {
            display: none;
        }

        /* Вода */
        .water-overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, rgba(30, 80, 60, 0.25), transparent);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.8s;
        }
        .water-overlay.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Луна -->
    <div class="moon"></div>

    <!-- Вода -->
    <div class="water-overlay" id="waterOverlay"></div>

    <!-- Лого -->
    <div class="logo">🦫 <span>CapyMusic</span> Radio</div>
    <div class="song-counter">🎵 <b id="songCount">0</b> / 5</div>

    <!-- Звёзды -->
    <div class="stars" id="stars"></div>

    <!-- Контейнер -->
    <div class="container">
        <!-- Сцена -->
        <div class="stage">
            <!-- Левая -->
            <div class="side-capy chill" id="sideCapyLeft">
                <div class="sombrero">🪅</div>
                <div class="zzz">💤</div>
                🦫
            </div>

            <!-- Главная -->
            <div class="main-capy-wrapper">
                <div class="main-capy-container" id="mainCapyContainer">
                    <div class="thought-bubble" id="thoughtBubble"></div>
                    <div class="hair-svg" id="hairSvg">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="115" height="115">
                            <path d="M18,40 C12,60 15,85 20,98 C24,98 28,92 28,82 C28,62 30,52 30,42 Z" fill="#D4A316"/>
                            <path d="M82,40 C88,60 85,85 80,98 C76,98 72,92 72,82 C72,62 70,52 70,42 Z" fill="#D4A316"/>
                            <path d="M50,14 C30,14 23,24 23,45 C23,65 19,82 24,92 C27,92 30,87 30,72 C30,52 34,32 50,32 C66,32 70,52 70,72 C70,87 73,92 76,92 C81,82 77,65 77,45 C77,25 70,14 50,14 Z" fill="#F4D068"/>
                            <path d="M50,17 C36,17 29,22 27,33 C32,24 41,22 50,22 C59,22 68,24 73,33 C71,22 64,17 50,17 Z" fill="#FFEAA7"/>
                            <path d="M26,50 C25,60 23,70 25,80 C26,70 28,60 27,50 Z" fill="#FFEAA7"/>
                            <path d="M74,50 C75,60 77,70 75,80 C74,70 72,60 73,50 Z" fill="#FFEAA7"/>
                        </svg>
                    </div>
                    <div class="main-sombrero" id="mainSombrero">🪅</div>
                    <div class="tongue" id="tongue">👅</div>
                    <div class="main-capy chill" id="mainCapy">🦫</div>
                    <div class="dog" id="dog">
                        🐕
                        <span class="dog-tongue">👅</span>
                    </div>
                </div>
            </div>

            <!-- Правая -->
            <div class="side-capy chill" id="sideCapyRight">
                <div class="sombrero">🪅</div>
                <div class="zzz">💤</div>
                🦫
            </div>
        </div>

        <!-- Эквалайзер -->
        <div class="equalizer visible" id="equalizer">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>

        <!-- Инфо -->
        <div class="track-info" id="trackInfo">
            <div class="track-title">Добро пожаловать на CapyMusic Radio</div>
            <div class="track-artist">Нажми ▶ чтобы начать</div>
            <div class="track-badge hidden" id="trackBadge"></div>
        </div>

        <!-- Прогресс -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>

        <!-- Кнопки -->
        <div class="controls">
            <button class="btn" onclick="skipSong()" title="Пропустить">⏭</button>
            <button class="btn btn-play" id="btnPlay" onclick="toggleRadio()">▶</button>
            <button class="btn" onclick="openInYandex()" title="Открыть в Яндекс Музыке">🔍</button>
        </div>
    </div>

    <audio id="audioPlayer" preload="none"></audio>

    <!-- Звуки (генерируются программно) -->
    <script>
        // ==================== ПЛЕЙЛИСТ ====================
        const playlist = [
            { title: "Macarena", artist: "Los del Río", vocals: "female", macarenaMode: true, url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                yandexUrl: "https://music.yandex.ru/search?text=macarena", chorusStart: [18, 58, 98], chorusDuration: 16,
                duration: 138 },
            { title: "Dancing Queen", artist: "ABBA", vocals: "female", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",

                duration: 196 },
            { title: "Bohemian Rhapsody", artist: "Queen", vocals: "male", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",

                chorusDuration: 25, duration: 355 },
            { title: "Billie Jean", artist: "Michael Jackson", vocals: "male", macarenaMode: false,

                yandexUrl: "https://music.yandex.ru/search?text=billie+jean", chorusStart: [50, 130], chorusDuration: 20,
                duration: 240 },
            { title: "I Will Survive", artist: "Gloria Gaynor", vocals: "female", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                yandexUrl: "https://music.yandex.ru/search?text=i+will+survive", chorusStart: [40, 110, 180],
                chorusDuration: 20, duration: 230 },
            { title: "Sweet Child O' Mine", artist: "Guns N' Roses", vocals: "male", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                yandexUrl: "https://music.yandex.ru/search?text=sweet+child+o+mine", chorusStart: [60, 160],
                chorusDuration: 22, duration: 295 },
            { title: "Like a Prayer", artist: "Madonna", vocals: "female", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3",
                yandexUrl: "https://music.yandex.ru/search?text=like+a+prayer", chorusStart: [45, 130], chorusDuration: 22,
                duration: 260 },
            { title: "Hotel California", artist: "Eagles", vocals: "male", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
                yandexUrl: "https://music.yandex.ru/search?text=hotel+california", chorusStart: [80, 200], chorusDuration: 28,
                duration: 310 },
            { title: "Wannabe", artist: "Spice Girls", vocals: "female", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3",
                yandexUrl: "https://music.yandex.ru/search?text=wannabe+spice+girls", chorusStart: [25, 80, 140],
                chorusDuration: 16, duration: 175 },
            { title: "Smells Like Teen Spirit", artist: "Nirvana", vocals: "male", macarenaMode: false,
                url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3",
                yandexUrl: "https://music.yandex.ru/search?text=smells+like+teen+spirit", chorusStart: [55, 160],
                chorusDuration: 24, duration: 278 },
        ];

        // ==================== СОСТОЯНИЕ ====================
        let currentSongIndex = 0;
        let currentSong = playlist[0];
        let isPlaying = false;
        let isBreak = false;
        let chorusActive = false;
        let songCounter = 0;
        let breakTimer = null;
        let progressInterval = null;
        let chorusInterval = null;
        let breakSeconds = 0;
        const BREAK_DURATION = 28; // секунд перерыва
        const SONGS_BEFORE_BREAK = 5;
        const BREAK_THOUGHTS = [
            'Ммм... вкусный арбуз...',
            'Буль-буль... водичка...',
            'Сейчас бы поплавать...',
            'Zzz... ещё 5 минуточек...',
            'Снится манго...',
            'Тепло и влажно...',
        ];

        // ==================== DOM ====================
        const audioPlayer = document.getElementById('audioPlayer');
        const btnPlay = document.getElementById('btnPlay');
        const mainCapy = document.getElementById('mainCapy');
        const sideCapyLeft = document.getElementById('sideCapyLeft');
        const sideCapyRight = document.getElementById('sideCapyRight');
        const hairSvg = document.getElementById('hairSvg');
        const mainSombrero = document.getElementById('mainSombrero');
        const tongue = document.getElementById('tongue');
        const dog = document.getElementById('dog');
        const thoughtBubble = document.getElementById('thoughtBubble');
        const trackTitle = document.querySelector('.track-title');
        const trackArtist = document.querySelector('.track-artist');
        const trackBadge = document.getElementById('trackBadge');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const equalizer = document.getElementById('equalizer');
        const waterOverlay = document.getElementById('waterOverlay');
        const songCountEl = document.getElementById('songCount');

        // ==================== ЗВЁЗДЫ ====================
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 2.5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
                star.style.setProperty('--delay', (Math.random() * 6) + 's');
                container.appendChild(star);
            }
        }

        // ==================== ЗВУКИ (Web Audio API) ====================
        let audioCtx = null;

        function playBubbleSound() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300 + Math.random() * 200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.35);
        }

        function playCapybaraChirp() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.08);
            osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.25);
        }

        function playJungleAmbient() {
            if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
            // Простой шумовой фон (сверчки)
            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * 0.02;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 4000;
            filter.Q.value = 0.5;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.03;
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.5);
        }

        // ==================== РЕЖИМЫ ====================
        function setChillMode() {
            mainCapy.className = 'main-capy chill';
            sideCapyLeft.className = 'side-capy chill';
            sideCapyRight.className = 'side-capy chill';
            tongue.classList.remove('visible');
            dog.classList.remove('visible');
            thoughtBubble.classList.remove('visible');
            waterOverlay.classList.remove('visible');
            equalizer.classList.add('visible');
            progressBar.classList.remove('break-bar');
            btnPlay.classList.remove('break-mode');
        }

        function setDanceMode() {
            mainCapy.className = 'main-capy dance';
            sideCapyLeft.className = 'side-capy dance';
            sideCapyRight.className = 'side-capy dance';
            tongue.classList.remove('visible');
            dog.classList.remove('visible');
            thoughtBubble.classList.remove('visible');
            waterOverlay.classList.remove('visible');
            equalizer.classList.add('visible');
            progressBar.classList.remove('break-bar');
            btnPlay.classList.remove('break-mode');
        }

        function setBreakMode() {
            mainCapy.className = 'main-capy sleep';
            sideCapyLeft.className = 'side-capy sleep';
            sideCapyRight.className = 'side-capy sleep';
            tongue.classList.add('visible');
            dog.classList.add('visible');
            thoughtBubble.classList.add('visible');
            waterOverlay.classList.add('visible');
            equalizer.classList.remove('visible');
            progressBar.classList.add('break-bar');
            btnPlay.classList.add('break-mode');
            mainSombrero.classList.remove('visible');
            sideCapyLeft.classList.remove('show-sombrero');
            sideCapyRight.classList.remove('show-sombrero');
            thoughtBubble.textContent = BREAK_THOUGHTS[Math.floor(Math.random() * BREAK_THOUGHTS.length)];
        }

        // ==================== ОБНОВЛЕНИЕ UI ====================
        function updateUI() {
            currentSong = playlist[currentSongIndex];
            trackTitle.textContent = currentSong.title;
            trackArtist.textContent = currentSong.artist;
            trackBadge.classList.remove('hidden', 'badge-female', 'badge-male', 'badge-macarena', 'badge-break');

            if (currentSong.macarenaMode) {
                trackBadge.textContent = '🪅 MACARENA';
                trackBadge.classList.add('badge-macarena');
            } else if (currentSong.vocals === 'female') {
                trackBadge.textContent = '🎤 Женский вокал';
                trackBadge.classList.add('badge-female');
            } else {
                trackBadge.textContent = '🎤 Мужской вокал';
                trackBadge.classList.add('badge-male');
            }

            if (currentSong.vocals === 'female') {
                hairSvg.classList.add('visible');
            } else {
                hairSvg.classList.remove('visible');
            }

            if (currentSong.macarenaMode) {
                mainSombrero.classList.add('visible');
                sideCapyLeft.classList.add('show-sombrero');
                sideCapyRight.classList.add('show-sombrero');
            } else {
                mainSombrero.classList.remove('visible');
                sideCapyLeft.classList.remove('show-sombrero');
                sideCapyRight.classList.remove('show-sombrero');
            }

            totalTimeEl.textContent = formatTime(currentSong.duration || 0);
            currentTimeEl.textContent = '0:00';
            progressBar.style.width = '0%';
            songCountEl.textContent = songCounter;
        }

        // ==================== ПРОГРЕСС ====================
        function startProgressTracking() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (isBreak) {
                    breakSeconds++;
                    const pct = (breakSeconds / BREAK_DURATION) * 100;
                    progressBar.style.width = pct + '%';
                    currentTimeEl.textContent = formatTime(breakSeconds);
                    totalTimeEl.textContent = formatTime(BREAK_DURATION);
                } else if (isPlaying && audioPlayer.duration) {
                    const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                    progressBar.style.width = pct + '%';
                    currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
                    totalTimeEl.textContent = formatTime(audioPlayer.duration || currentSong.duration);
                }
            }, 400);
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        // ==================== ПРИПЕВЫ ====================
        function startChorusDetection() {
            clearInterval(chorusInterval);
            chorusInterval = setInterval(() => {
                if (!isPlaying || isBreak) return;
                const t = audioPlayer.currentTime;
                let inChorus = false;
                if (currentSong.chorusStart) {
                    inChorus = currentSong.chorusStart.some(s => t >= s && t <= s + currentSong
                        .chorusDuration);
                }
                if (inChorus && !chorusActive) {
                    chorusActive = true;
                    setDanceMode();
                } else if (!inChorus && chorusActive) {
                    chorusActive = false;
                    setChillMode();
                }
            }, 150);
        }

        // ==================== ПЕРЕРЫВ ====================
        function startBreak() {
            isBreak = true;
            breakSeconds = 0;
            audioPlayer.pause();
            isPlaying = false;
            chorusActive = false;
            setBreakMode();
            trackTitle.textContent = 'Перерыв';
            trackArtist.textContent = 'Капибары отдыхают';
            trackBadge.classList.remove('hidden', 'badge-female', 'badge-male', 'badge-macarena');
            trackBadge.textContent = '💤 Chill Time';
            trackBadge.classList.add('badge-break');
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            totalTimeEl.textContent = formatTime(BREAK_DURATION);
            btnPlay.textContent = '⏸';
            songCounter = 0;
            songCountEl.textContent = '0';
            hairSvg.classList.remove('visible');
            mainSombrero.classList.remove('visible');
            sideCapyLeft.classList.remove('show-sombrero');
            sideCapyRight.classList.remove('show-sombrero');

            // Звуки перерыва
            playJungleAmbient();
            setTimeout(() => playBubbleSound(), 2000);
            setTimeout(() => playCapybaraChirp(), 5000);
            setTimeout(() => playBubbleSound(), 9000);
            setTimeout(() => playCapybaraChirp(), 13000);
            setTimeout(() => playBubbleSound(), 17000);
            setTimeout(() => playJungleAmbient(), 20000);
            setTimeout(() => playBubbleSound(), 23000);
        }

        function endBreak() {
            isBreak = false;
            clearTimeout(breakTimer);
            setChillMode();
            trackBadge.classList.remove('badge-break');
            songCounter = 0;
            songCountEl.textContent = '0';
            updateUI();
            playCurrentSong();
        }

        // ==================== ВОСПРОИЗВЕДЕНИЕ ====================
        function playCurrentSong() {
            audioPlayer.src = currentSong.url;
            audioPlayer.load();
            audioPlayer.play().then(() => {
                isPlaying = true;
                isBreak = false;
                btnPlay.textContent = '⏸';
                setChillMode();
                startChorusDetection();
                startProgressTracking();
            }).catch(() => {
                setTimeout(() => nextSong(), 800);
            });
        }

        function toggleRadio() {
            if (isBreak) {
                // Во время перерыва — скипаем перерыв
                clearTimeout(breakTimer);
                endBreak();
                return;
            }
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                btnPlay.textContent = '▶';
                clearInterval(progressInterval);
            } else {
                if (!audioPlayer.src || audioPlayer.src !== currentSong.url) {
                    playCurrentSong();
                } else {
                    audioPlayer.play().then(() => {
                        isPlaying = true;
                        btnPlay.textContent = '⏸';
                        startProgressTracking();
                        startChorusDetection();
                    });
                }
            }
        }

        function nextSong() {
            songCounter++;
            songCountEl.textContent = songCounter;

            if (songCounter >= SONGS_BEFORE_BREAK) {
                startBreak();
                breakTimer = setTimeout(() => {
                    currentSongIndex = (currentSongIndex + 1) % playlist.length;
                    endBreak();
                }, BREAK_DURATION * 1000);
                return;
            }

            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            chorusActive = false;
            updateUI();
            if (isPlaying || btnPlay.textContent === '⏸') {
                playCurrentSong();
            }
        }

        function skipSong() {
            if (isBreak) {
                clearTimeout(breakTimer);
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
                endBreak();
                return;
            }
            audioPlayer.pause();
            clearInterval(progressInterval);
            nextSong();
        }

        function openInYandex() {
            if (!isBreak) window.open(currentSong.yandexUrl, '_blank');
        }

        // Когда трек закончился
        audioPlayer.addEventListener('ended', () => {
            nextSong();
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            if (!isBreak) totalTimeEl.textContent = formatTime(audioPlayer.duration || currentSong.duration);
        });

        // Клик по прогресс-бару
        document.getElementById('progressContainer').addEventListener('click', function(e) {
            if (isBreak || !audioPlayer.duration) return;
            const rect = this.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = pct * audioPlayer.duration;
        });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        createStars();
        setChillMode();
        updateUI();
        songCountEl.textContent = '0';

        console.log('🦫 CapyMusic Radio готов!');
        console.log('📻 by Capybara Inc.');
        console.log('💤 Перерыв каждые', SONGS_BEFORE_BREAK, 'песен');
        console.log('🐕 Собака спит рядом в перерыве');
    </script>
</body>
</html>
