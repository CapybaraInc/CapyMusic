<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapyMusic Radio 🦫</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(180deg, #0d1117 0%, #161b22 40%, #1a3a2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            user-select: none;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.2;
            }
            50% {
                opacity: 0.9;
            }
        }
        .moon {
            position: fixed;
            top: 25px;
            right: 40px;
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 30% 30%, #fffde7, #f9e076);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 230, 150, 0.5);
            z-index: 0;
        }
        .logo {
            position: fixed;
            top: 22px;
            left: 30px;
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 2.5px;
            z-index: 10;
            text-transform: uppercase;
        }
        .logo span {
            color: #F4D068;
            font-weight: 700;
        }
        .song-counter {
            position: fixed;
            top: 22px;
            right: 120px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 10;
        }
        .song-counter b {
            color: #F4D068;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 1;
            position: relative;
        }
        .stage {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            position: relative;
            min-height: 240px;
        }
        .side-capy {
            font-size: 40px;
            position: relative;
            align-self: flex-end;
            margin-bottom: 50px;
        }
        .side-capy .side-sombrero {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .side-capy.show-sombrero .side-sombrero {
            opacity: 1;
        }
        .side-capy.chill {
            animation: sideChill 2s ease-in-out infinite;
        }
        .side-capy.dance {
            animation: sideDance 0.4s ease-in-out infinite;
        }
        .side-capy.sleep {
            animation: sideSleep 3s ease-in-out infinite;
            opacity: 0.6;
        }
        .side-capy .zzz {
            position: absolute;
            top: -18px;
            right: -8px;
            font-size: 14px;
            opacity: 0;
        }
        .side-capy.sleep .zzz {
            opacity: 1;
            animation: floatZ 2s ease-out infinite;
        }
        @keyframes floatZ {
            0% {
                transform: translateY(0);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-25px);
                opacity: 0;
            }
        }
        @keyframes sideChill {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }
        @keyframes sideDance {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            20% {
                transform: translateY(-10px) rotate(-5deg);
            }
            40% {
                transform: translateY(-2px) rotate(3deg);
            }
            60% {
                transform: translateY(-8px) rotate(-2deg);
            }
            80% {
                transform: translateY(-12px) rotate(4deg);
            }
        }
        @keyframes sideSleep {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }
        .main-capy-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-capy-stack {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hair-layer {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .hair-layer.visible {
            opacity: 1;
        }
        .sombrero-layer {
            position: absolute;
            top: -58px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .sombrero-layer.visible {
            opacity: 1;
        }
        .main-capy-emoji {
            font-size: 100px;
            position: relative;
            z-index: 1;
            transition: all 0.4s;
        }
        .main-capy-emoji.chill {
            animation: mainChill 2.5s ease-in-out infinite;
        }
        .main-capy-emoji.dance {
            animation: mainDance 0.35s ease-in-out infinite;
        }
        .main-capy-emoji.sleep {
            animation: mainSleep 3.5s ease-in-out infinite;
            filter: brightness(0.6);
        }
        .tongue-out {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .tongue-out.visible {
            opacity: 1;
            animation: tongueWiggle 2s ease-in-out infinite;
        }
        @keyframes tongueWiggle {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            30% {
                transform: translateX(-50%) translateY(3px);
            }
            60% {
                transform: translateX(-50%) translateY(-1px);
            }
        }
        .dog-sleep {
            position: absolute;
            bottom: 0;
            right: -35px;
            font-size: 32px;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .dog-sleep.visible {
            opacity: 0.7;
            animation: dogSleep 4s ease-in-out infinite;
        }
        @keyframes dogSleep {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-2px);
            }
        }
        .thought-bubble {
            position: absolute;
            top: -75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 18px;
            padding: 7px 14px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            z-index: 7;
            opacity: 0;
            transition: opacity 0.5s;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }
        .thought-bubble.visible {
            opacity: 1;
        }
        /* Аксессуары */
        .accessory-layer {
            position: absolute;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            font-size: 30px;
        }
        .accessory-layer.visible {
            opacity: 1;
        }
        .acc-crown {
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
        }
        .acc-guitar {
            bottom: 10px;
            left: -20px;
        }
        .acc-glasses {
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
        }
        .acc-gloves {
            bottom: 20px;
            left: -25px;
            right: -25px;
            display: flex;
            justify-content: space-between;
            font-size: 25px;
        }
        .acc-cucumber {
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 35px;
        }
        .acc-carrot {
            top: 40px;
            right: -15px;
            font-size: 28px;
        }
        .acc-lavash {
            bottom: 15px;
            left: -25px;
            font-size: 30px;
        }
        .acc-meat {
            bottom: 15px;
            right: -25px;
            font-size: 30px;
        }
        .acc-fish {
            top: 30px;
            right: -20px;
            font-size: 28px;
            animation: fishSwim 2s ease-in-out infinite;
        }
        .acc-droplet {
            top: 0;
            left: -20px;
            font-size: 24px;
            animation: dropletFall 1.5s ease-in infinite;
        }
        @keyframes fishSwim {
            0%,
            100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(8px);
            }
        }
        @keyframes dropletFall {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(30px);
                opacity: 0;
            }
        }
        @keyframes mainChill {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            30% {
                transform: translateY(-3px) scale(1.02);
            }
            60% {
                transform: translateY(-1px) scale(1.01);
            }
        }
        @keyframes mainDance {
            0%,
            100% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            15% {
                transform: translateY(-14px) rotate(-4deg) scale(1.06);
            }
            30% {
                transform: translateY(-3px) rotate(2deg) scale(0.97);
            }
            45% {
                transform: translateY(-9px) rotate(-3deg) scale(1.04);
            }
            60% {
                transform: translateY(-16px) rotate(5deg) scale(1.08);
            }
            75% {
                transform: translateY(-5px) rotate(-1deg) scale(1.01);
            }
            90% {
                transform: translateY(-12px) rotate(3deg) scale(1.05);
            }
        }
        @keyframes mainSleep {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            40% {
                transform: translateY(-3px) scale(1.02);
            }
            70% {
                transform: translateY(-1px) scale(1.01);
            }
        }
        .yandex-frame-wrap {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        .equalizer {
            display: flex;
            gap: 3px;
            align-items: flex-end;
            height: 20px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .equalizer.visible {
            opacity: 0.6;
        }
        .eq-bar {
            width: 3px;
            background: #F4D068;
            border-radius: 2px;
            animation: eqJump 0.6s ease-in-out infinite;
        }
        .eq-bar:nth-child(1) {
            animation-delay: 0s;
            height: 10px;
        }
        .eq-bar:nth-child(2) {
            animation-delay: 0.15s;
            height: 16px;
        }
        .eq-bar:nth-child(3) {
            animation-delay: 0.3s;
            height: 9px;
        }
        .eq-bar:nth-child(4) {
            animation-delay: 0.45s;
            height: 14px;
        }
        @keyframes eqJump {
            0%,
            100% {
                transform: scaleY(0.5);
            }
            50% {
                transform: scaleY(1);
            }
        }
        .track-info {
            text-align: center;
            color: white;
            transition: all 0.4s;
        }
        .track-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .track-artist {
            font-size: 13px;
            opacity: 0.5;
            margin-top: 2px;
        }
        .track-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .badge-macarena {
            background: rgba(255, 100, 100, 0.15);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.25);
            animation: pulse 1s infinite;
        }
        .badge-queen {
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.25);
        }
        .badge-rock {
            background: rgba(255, 69, 0, 0.15);
            color: #ff4500;
            border: 1px solid rgba(255, 69, 0, 0.25);
        }
        .badge-boxer {
            background: rgba(255, 255, 0, 0.15);
            color: #ffff00;
            border: 1px solid rgba(255, 255, 0, 0.25);
        }
        .badge-metal {
            background: rgba(180, 0, 0, 0.15);
            color: #ff4444;
            border: 1px solid rgba(180, 0, 0, 0.25);
        }
        .badge-chill {
            background: rgba(100, 200, 255, 0.15);
            color: #64c8ff;
            border: 1px solid rgba(100, 200, 255, 0.25);
        }
        .badge-water {
            background: rgba(0, 150, 255, 0.15);
            color: #0096ff;
            border: 1px solid rgba(0, 150, 255, 0.25);
        }
        .badge-cucumber {
            background: rgba(0, 255, 0, 0.15);
            color: #00ff00;
            border: 1px solid rgba(0, 255, 0, 0.25);
        }
        .badge-lavash {
            background: rgba(210, 180, 140, 0.15);
            color: #d2b48c;
            border: 1px solid rgba(210, 180, 140, 0.25);
        }
        .badge-rickroll {
            background: rgba(255, 0, 255, 0.15);
            color: #ff00ff;
            border: 1px solid rgba(255, 0, 255, 0.25);
            animation: pulse 0.5s infinite;
        }
        .badge-break {
            background: rgba(100, 220, 180, 0.15);
            color: #64dcb4;
            border: 1px solid rgba(100, 220, 180, 0.25);
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            white-space: nowrap;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-play {
            width: 48px;
            height: 48px;
            padding: 0;
            border-radius: 50%;
            font-size: 18px;
            background: rgba(244, 208, 104, 0.18);
            border-color: rgba(244, 208, 104, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .btn-play:hover {
            background: rgba(244, 208, 104, 0.28);
        }
        .btn-play.break-mode {
            background: rgba(100, 220, 180, 0.18);
            border-color: rgba(100, 220, 180, 0.35);
        }
        .progress-container {
            width: 260px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
        }
        .progress-bar {
            height: 100%;
            background: #F4D068;
            border-radius: 8px;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-bar.break-bar {
            background: #64dcb4;
        }
        .progress-time {
            display: flex;
            justify-content: space-between;
            width: 260px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            margin-top: 3px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="moon"></div>
    <div class="logo">🦫 <span>CapyMusic</span> Radio</div>
    <div class="song-counter">🎵 <b id="songCount">0</b> / 5</div>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="stage">
            <div class="side-capy chill" id="sideCapyLeft">
                <div class="side-sombrero">🪅</div><div class="zzz">💤</div>🦫
            </div>
            <div class="main-capy-wrapper">
                <div class="main-capy-stack" id="mainCapyStack">
                    <div class="thought-bubble" id="thoughtBubble"></div>
                    <!-- Сомбреро -->
                    <div class="sombrero-layer" id="sombreroLayer">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="90" height="90">
                            <ellipse cx="50" cy="55" rx="28" ry="6" fill="#E5A93C"/>
                            <path d="M 38 53 Q 50 25 62 53 Z" fill="#E5A93C"/>
                            <path d="M 40 50 Q 50 35 60 50" stroke="#D9381E" stroke-width="2.5" fill="none"/>
                            <path d="M 41.5 52 Q 50 38 58.5 52" stroke="#228B22" stroke-width="1.8" fill="none"/>
                        </svg>
                    </div>
                    <!-- Волосы -->
                    <div class="hair-layer" id="hairLayer">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="110" height="110">
                            <path d="M18,40 C12,60 15,85 20,98 C24,98 28,92 28,82 C28,62 30,52 30,42 Z" fill="#D4A316"/>
                            <path d="M82,40 C88,60 85,85 80,98 C76,98 72,92 72,82 C72,62 70,52 70,42 Z" fill="#D4A316"/>
                            <path d="M50,14 C30,14 23,24 23,45 C23,65 19,82 24,92 C27,92 30,87 30,72 C30,52 34,32 50,32 C66,32 70,52 70,72 C70,87 73,92 76,92 C81,82 77,65 77,45 C77,25 70,14 50,14 Z" fill="#F4D068"/>
                            <path d="M50,17 C36,17 29,22 27,33 C32,24 41,22 50,22 C59,22 68,24 73,33 C71,22 64,17 50,17 Z" fill="#FFEAA7"/>
                        </svg>
                    </div>
                    <!-- Аксессуары -->
                    <div class="accessory-layer acc-crown" id="accCrown">👑</div>
                    <div class="accessory-layer acc-guitar" id="accGuitar">🎸</div>
                    <div class="accessory-layer acc-glasses" id="accGlasses">🕶️</div>
                    <div class="accessory-layer acc-gloves" id="accGloves"><span>🥊</span><span>🥊</span></div>
                    <div class="accessory-layer acc-cucumber" id="accCucumber">🥒</div>
                    <div class="accessory-layer acc-carrot" id="accCarrot">🥕</div>
                    <div class="accessory-layer acc-lavash" id="accLavash">🥙</div>
                    <div class="accessory-layer acc-meat" id="accMeat">🥩</div>
                    <div class="accessory-layer acc-fish" id="accFish">🐟</div>
                    <div class="accessory-layer acc-droplet" id="accDroplet1">💧</div>
                    <div class="accessory-layer acc-droplet" id="accDroplet2" style="top:10px;left:-30px;animation-delay:0.7s;">💧</div>
                    <div class="tongue-out" id="tongueOut">👅</div>
                    <div class="main-capy-emoji chill" id="mainCapyEmoji">🦫</div>
                    <div class="dog-sleep" id="dogSleep">🐕</div>
                </div>
            </div>
            <div class="side-capy chill" id="sideCapyRight">
                <div class="side-sombrero">🪅</div><div class="zzz">💤</div>🦫
            </div>
        </div>
        <div class="yandex-frame-wrap" id="yandexFrameWrap"></div>
        <div class="equalizer visible" id="equalizer">
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
        </div>
        <div class="track-info">
            <div class="track-title" id="trackTitle">CapyMusic Radio</div>
            <div class="track-artist" id="trackArtist">Нажми ▶</div>
            <div class="track-badge hidden" id="trackBadge"></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-time">
            <span id="currentTime">0:00</span><span id="totalTime">~3:00</span>
        </div>
        <div class="controls">
            <button class="btn" onclick="skipSong()">⏭</button>
            <button class="btn btn-play" id="btnPlay" onclick="toggleRadio()">▶</button>
            <button class="btn" onclick="openInYandex()">🔍</button>
        </div>
    </div>
    <script>
        // ==================== ПЛЕЙЛИСТ ====================
        const playlist = [
            { id: "33524091", title: "Macarena", artist: "Los del Río",
                mode: "macarena", duration: 230 },
            { id: "609676", title: "Never Gonna Give You Up", artist: "Rick Astley",
                mode: "rickroll", duration: 213 },
            { id: "53404", title: "Bohemian Rhapsody", artist: "Queen",
                mode: "queen", duration: 355 },
            { id: "39484", title: "Fuel", artist: "Metallica",
                mode: "rock", duration: 270 },
            { id: "15362962", title: "Eye of the Tiger", artist: "Survivor",
                mode: "boxer", duration: 240 },
            { id: "52071184", title: "Worlds Colliding", artist: "Accept",
                mode: "metal", duration: 280 },
            { id: "146018229", title: "Around the World (Slowed+Reverb)", artist: "tontrader",
                mode: "chill", duration: 200 },
            { id: "141022013", title: "Рыбка", artist: "Ernest Merkel, BSWEEDY, VanDiBog",
                mode: "water", duration: 180 },
            { id: "139193622", title: "ПОЧЕМУ?", artist: "newhefner, aqumardn",
                mode: "cucumber", duration: 160 },
            { id: "141193965", title: "ЛАВАШ-ГОВЯДИНА", artist: "JorikRulit, YUNG FIMOZ",
                mode: "lavash", duration: 170 }
        ];
        const SONGS_BEFORE_BREAK = 5;
        const BREAK_DURATION = 28;
        const BREAK_THOUGHTS = ['Ммм... арбуз...', 'Буль-буль...', 'Сейчас бы поплавать...', 'Zzz... ещё 5 минуточек...',
            'Снится манго...', 'Тепло и влажно...', 'Огуречик...', 'Лаваш и говядина...'];
        let currentSongIndex = 0;
        let currentSong = playlist[0];
        let isPlaying = false;
        let isBreak = false;
        let songCounter = 0;
        let breakTimer = null;
        let progressInterval = null;
        let breakSeconds = 0;
        let simulatedTime = 0;
        let totalSimulated = 200;
        // DOM
        const btnPlay = document.getElementById('btnPlay');
        const mainCapyEmoji = document.getElementById('mainCapyEmoji');
        const sideCapyLeft = document.getElementById('sideCapyLeft');
        const sideCapyRight = document.getElementById('sideCapyRight');
        const hairLayer = document.getElementById('hairLayer');
        const sombreroLayer = document.getElementById('sombreroLayer');
        const tongueOut = document.getElementById('tongueOut');
        const dogSleep = document.getElementById('dogSleep');
        const thoughtBubble = document.getElementById('thoughtBubble');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const trackBadge = document.getElementById('trackBadge');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const equalizer = document.getElementById('equalizer');
        const songCountEl = document.getElementById('songCount');
        const yandexFrameWrap = document.getElementById('yandexFrameWrap');
        const allAcc = ['accCrown', 'accGuitar', 'accGlasses', 'accGloves', 'accCucumber', 'accCarrot', 'accLavash',
            'accMeat', 'accFish', 'accDroplet1', 'accDroplet2'
        ];
        // Звёзды
        function createStars() { const c = document.getElementById('stars'); for (let i = 0; i < 100; i++) { const s =
                document.createElement('div');
            s.classList.add('star');
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%'; const sz = Math.random() * 2.5 + 1;
            s.style.width = sz + 'px';
            s.style.height = sz + 'px';
            s.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
            s.style.setProperty('--delay', (Math.random() * 6) + 's');
            c.appendChild(s); } }
        // Сброс аксессуаров
        function resetAccessories() { allAcc.forEach(id => { document.getElementById(id).classList.remove('visible'); }); }
        // Режимы
        function setChill() { mainCapyEmoji.className = 'main-capy-emoji chill';
            sideCapyLeft.className = 'side-capy chill';
            sideCapyRight.className = 'side-capy chill';
            tongueOut.classList.remove('visible');
            dogSleep.classList.remove('visible');
            thoughtBubble.classList.remove('visible');
            equalizer.classList.add('visible');
            progressBar.classList.remove('break-bar');
            btnPlay.classList.remove('break-mode'); }

        function setDance() { mainCapyEmoji.className = 'main-capy-emoji dance';
            sideCapyLeft.className = 'side-capy dance';
            sideCapyRight.className = 'side-capy dance'; }

        function setSleep() { mainCapyEmoji.className = 'main-capy-emoji sleep';
            sideCapyLeft.className = 'side-capy sleep';
            sideCapyRight.className = 'side-capy sleep';
            tongueOut.classList.add('visible');
            dogSleep.classList.add('visible');
            thoughtBubble.classList.add('visible');
            equalizer.classList.remove('visible');
            progressBar.classList.add('break-bar');
            btnPlay.classList.add('break-mode');
            sombreroLayer.classList.remove('visible');
            sideCapyLeft.classList.remove('show-sombrero');
            sideCapyRight.classList.remove('show-sombrero');
            resetAccessories();
            hairLayer.classList.remove('visible');
            thoughtBubble.textContent = BREAK_THOUGHTS[Math.floor(Math.random() * BREAK_THOUGHTS.length)]; }
        // UI
        function updateUI() { currentSong = playlist[currentSongIndex];
            trackTitle.textContent = currentSong.title;
            trackArtist.textContent = currentSong.artist;
            trackBadge.classList.remove('hidden');
            trackBadge.className = 'track-badge';
            resetAccessories();
            hairLayer.classList.remove('visible');
            sombreroLayer.classList.remove('visible');
            sideCapyLeft.classList.remove('show-sombrero');
            sideCapyRight.classList.remove('show-sombrero');
            totalSimulated = currentSong.duration || 200;
            simulatedTime = 0;
            totalTimeEl.textContent = formatTime(totalSimulated);
            currentTimeEl.textContent = '0:00';
            progressBar.style.width = '0%';
            songCountEl.textContent = songCounter;
            switch (currentSong.mode) {
                case 'macarena':
                    trackBadge.textContent = '🪅 MACARENA';
                    trackBadge.classList.add('badge-macarena');
                    sombreroLayer.classList.add('visible');
                    sideCapyLeft.classList.add('show-sombrero');
                    sideCapyRight.classList.add('show-sombrero');
                    break;
                case 'rickroll':
                    trackBadge.textContent = '🕺 RICKROLL!';
                    trackBadge.classList.add('badge-rickroll');
                    document.getElementById('accGlasses').classList.add('visible');
                    break;
                case 'queen':
                    trackBadge.textContent = '👑 QUEEN';
                    trackBadge.classList.add('badge-queen');
                    document.getElementById('accCrown').classList.add('visible');
                    break;
                case 'rock':
                    trackBadge.textContent = '🎸 ROCK';
                    trackBadge.classList.add('badge-rock');
                    document.getElementById('accGuitar').classList.add('visible');
                    document.getElementById('accGlasses').classList.add('visible');
                    break;
                case 'boxer':
                    trackBadge.textContent = '🥊 BOXER';
                    trackBadge.classList.add('badge-boxer');
                    document.getElementById('accGloves').classList.add('visible');
                    break;
                case 'metal':
                    trackBadge.textContent = '🤘 METAL';
                    trackBadge.classList.add('badge-metal');
                    document.getElementById('accGuitar').classList.add('visible');
                    break;
                case 'chill':
                    trackBadge.textContent = '🌀 CHILL';
                    trackBadge.classList.add('badge-chill');
                    break;
                case 'water':
                    trackBadge.textContent = '🐟 РЫБКА';
                    trackBadge.classList.add('badge-water');
                    document.getElementById('accFish').classList.add('visible');
                    document.getElementById('accDroplet1').classList.add('visible');
                    document.getElementById('accDroplet2').classList.add('visible');
                    break;
                case 'cucumber':
                    trackBadge.textContent = '🥒 ОГУРЕЧИК';
                    trackBadge.classList.add('badge-cucumber');
                    document.getElementById('accCucumber').classList.add('visible');
                    document.getElementById('accCarrot').classList.add('visible');
                    break;
                case 'lavash':
                    trackBadge.textContent = '🥙 ЛАВАШ-ГОВЯДИНА';
                    trackBadge.classList.add('badge-lavash');
                    document.getElementById('accLavash').classList.add('visible');
                    document.getElementById('accMeat').classList.add('visible');
                    break;
            }
            loadYandexTrack(currentSong.id); }

        function loadYandexTrack(trackId) { yandexFrameWrap.innerHTML =
                `<iframe src="https://music.yandex.ru/iframe/track/${trackId}" width="1" height="1" frameborder="0" allow="autoplay"></iframe>`; }
        // Прогресс
        function startProgressTracking() { clearInterval(progressInterval);
            progressInterval = setInterval(() => { if (isBreak) { breakSeconds++; const pct = (breakSeconds / BREAK_DURATION) *
                        100;
                    progressBar.style.width = pct + '%';
                    currentTimeEl.textContent = formatTime(breakSeconds);
                    totalTimeEl.textContent = formatTime(BREAK_DURATION); } else if (isPlaying) { simulatedTime++; if (
                        simulatedTime >= totalSimulated) { simulatedTime = totalSimulated;
                        nextSong(); return; } const pct = (simulatedTime / totalSimulated) * 100;
                    progressBar.style.width = pct + '%';
                    currentTimeEl.textContent = formatTime(simulatedTime);
                    totalTimeEl.textContent = formatTime(totalSimulated); const phase = simulatedTime / totalSimulated; const
                        inChorus = (phase > 0.25 && phase < 0.5) || (phase > 0.65 && phase < 0.85); if (inChorus && mainCapyEmoji
                        .classList.contains('chill')) { setDance(); } else if (!inChorus && mainCapyEmoji.classList.contains(
                            'dance')) { setChill(); } } }, 1000); }

        function formatTime(s) { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s / 60); const sec = Math.floor(s %
                60); return m + ':' + (sec < 10 ? '0' : '') + sec; }
        // Перерыв
        function startBreak() { isBreak = true;
            breakSeconds = 0;
            isPlaying = false;
            setSleep();
            trackTitle.textContent = 'Перерыв';
            trackArtist.textContent = 'Капибары отдыхают';
            trackBadge.className = 'track-badge badge-break';
            trackBadge.textContent = '💤 Chill';
            progressBar.style.width = '0%';
            songCounter = 0;
            songCountEl.textContent = '0';
            btnPlay.textContent = '⏸'; }

        function endBreak() { isBreak = false;
            songCounter = 0;
            songCountEl.textContent = '0';
            setChill();
            trackBadge.className = 'track-badge hidden';
            updateUI();
            startPlayback(); }
        // Воспроизведение
        function startPlayback() { isPlaying = true;
            isBreak = false;
            btnPlay.textContent = '⏸';
            simulatedTime = 0;
            setChill();
            startProgressTracking();
            loadYandexTrack(currentSong.id); }

        function toggleRadio() { if (isBreak) { clearTimeout(breakTimer);
                endBreak(); return; } if (isPlaying) { isPlaying = false;
                btnPlay.textContent = '▶';
                clearInterval(progressInterval); } else { startPlayback(); } }

        function nextSong() { songCounter++;
            songCountEl.textContent = songCounter; if (songCounter >= SONGS_BEFORE_BREAK) { startBreak();
                breakTimer = setTimeout(() => { currentSongIndex = (currentSongIndex + 1) % playlist.length;
                    endBreak(); }, BREAK_DURATION * 1000); return; }
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            updateUI(); if (isPlaying) startPlayback(); }

        function skipSong() { if (isBreak) { clearTimeout(breakTimer);
                currentSongIndex = (currentSongIndex + 1) % playlist.length;
                endBreak(); return; }
            nextSong(); }

        function openInYandex() { if (!isBreak) window.open('https://music.yandex.ru/track/' + currentSong.id,
            '_blank'); }
        createStars();
        setChill();
        updateUI();
        songCountEl.textContent = '0';
        console.log('🦫 CapyMusic Radio готов!');
        console.log('🎵 10 треков загружено');
        console.log('🪅 Macarena | 🕺 Rickroll | 👑 Queen | 🎸 Metallica | 🥊 Eye of the Tiger');
        console.log('🤘 Accept | 🌀 tontrader | 🐟 Рыбка | 🥒 Огуречик | 🥙 Лаваш-Говядина');
        console.log('💤 Перерыв каждые 5 песен');
        console.log('by Capybara Inc.');
    </script>
</body>
    </html>
